<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raíz Repostería - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { crema: '#fef5d4', azulBtn: '#2b88ff' } } } }
    </script>
</head>
<body class="bg-crema min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <div class="bg-white p-8 border-2 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] w-full max-w-md">
        <h1 id="auth-title" class="text-3xl font-bold mb-2 uppercase italic">Iniciar Sesión</h1>
        <p id="auth-switch-text" class="mb-6 text-sm text-gray-600 uppercase font-bold cursor-pointer hover:underline" onclick="toggleAuth()">
            ¿No tienes cuenta? Regístrate aquí
        </p>

        <form id="auth-form" onsubmit="manejarAuth(event)" class="flex flex-col gap-4">
            <div id="grupo-nombre" class="hidden flex flex-col gap-1">
                <label class="text-xs font-black uppercase">Nombre completo:</label>
                <input type="text" id="auth-nombre" class="border-2 border-black p-2 outline-none focus:bg-yellow-50">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-black uppercase">Correo electrónico:</label>
                <input type="email" id="auth-correo" required class="border-2 border-black p-2 outline-none focus:bg-yellow-50">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-black uppercase">Contraseña:</label>
                <input type="password" id="auth-password" required class="border-2 border-black p-2 outline-none focus:bg-yellow-50">
            </div>

            <button type="submit" id="auth-btn" class="bg-azulBtn text-white font-bold uppercase p-3 border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 active:shadow-none transition-all mt-2">
                Ingresar
            </button>
        </form>
    </div>

    <script>
        let isLoginMode = true;

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Iniciar Sesión" : "Crear Cuenta";
            document.getElementById('auth-switch-text').innerText = isLoginMode ? "¿No tienes cuenta? Regístrate aquí" : "¿Ya tienes cuenta? Ingresa aquí";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Ingresar" : "Registrarme";
            document.getElementById('grupo-nombre').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-nombre').required = !isLoginMode;
        }

        function manejarAuth(e) {
            e.preventDefault();
            const nombre = document.getElementById('auth-nombre').value;
            const correo = document.getElementById('auth-correo').value;
            const password = document.getElementById('auth-password').value;
            let usuarios = JSON.parse(localStorage.getItem('raiz_usuarios')) || [];

            if (isLoginMode) {
                const user = usuarios.find(u => u.correo === correo && u.password === password);
                if (user) {
                    localStorage.setItem('usuario_logueado', JSON.stringify({ nombre: user.nombre, correo: user.correo }));
                    window.location.href = "productos.html";
                } else {
                    alert("Datos incorrectos.");
                }
            } else {
                if (usuarios.some(u => u.correo === correo)) { alert("El correo ya existe."); return; }
                usuarios.push({ nombre, correo, password });
                localStorage.setItem('raiz_usuarios', JSON.stringify(usuarios));
                localStorage.setItem('usuario_logueado', JSON.stringify({ nombre, correo }));
                window.location.href = "productos.html";
            }
        }
    </script>
</body>
</html>
