<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raíz App - Escáner Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { crema: '#fef5d4', verdeLike: '#9bf08b', azulBtn: '#2b88ff' } } } }
    </script>
    <style>
        body { background-color: #fef5d4; font-family: sans-serif; color: #111; }
        .neo-box { border: 2px solid black; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-12">

    <header class="p-4 border-b-2 border-black flex items-center justify-between bg-white px-6">
        <div class="font-bold uppercase tracking-tighter italic text-lg flex items-center gap-2">
            <i class="ph ph-wallet text-2xl text-blue-600"></i> Raíz Monedero Real
        </div>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full flex flex-col gap-6">
        
        <div class="bg-white p-6 neo-box shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] text-center">
            <p class="text-xs font-bold uppercase text-gray-500 tracking-widest mb-1">Mis Puntos de Fidelidad</p>
            <h2 id="total-puntos" class="text-5xl font-black text-blue-600 my-2">0</h2>
        </div>

        <div class="bg-white p-4 neo-box shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            <h3 class="text-sm font-bold uppercase mb-3 flex items-center gap-1">
                <i class="ph ph-camera text-lg"></i> Escáner de Cámara
            </h3>
            
            <div id="lector-qr" class="w-full bg-black border-2 border-black overflow-hidden rounded"></div>
            
            <button onclick="iniciarCamara()" class="w-full mt-3 bg-azulBtn text-white border-2 border-black py-3 font-bold uppercase text-xs tracking-wider">
                Encender Cámara
            </button>
        </div>

        <div class="bg-white p-4 neo-box shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex-1 flex flex-col">
            <h3 class="text-sm font-bold uppercase mb-3 border-b-2 border-black pb-2 flex items-center gap-1">
                <i class="ph ph-clock-counter-clockwise text-lg"></i> Compras Escaneadas en este Celular
            </h3>
            <div id="lista-historial" class="flex flex-col gap-2 overflow-y-auto max-h-64 flex-1"></div>
        </div>
    </main>

    <script {is_local_variant="true"}>
        let html5QrcodeScanner;

        window.onload = function() {
            actualizarHistorialYPuntos();
        };

        function iniciarCamara() {
            // Configura el lector de QR utilizando la cámara trasera
            html5QrcodeScanner = new Html5Qrcode("lector-qr");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess
            ).catch(err => {
                alert("Error al abrir la cámara. Asegúrate de dar permisos o usar HTTPS.");
            });
        }

        function onScanSuccess(decodedText) {
            // Detenemos la cámara para que no siga escaneando repetidamente
            html5QrcodeScanner.stop();

            try {
                // Parseamos el JSON que viene oculto en el código QR
                const datos = JSON.parse(decodedText);

                if (datos.origen === "Raiz Repostería" && datos.accion === "compra_carrito") {
                    
                    // Obtenemos lo que ya tuviera guardado este celular
                    let misComprasGuardadas = JSON.parse(localStorage.getItem('app_mis_compras')) || [];

                    // Añadimos las cosas nuevas que venían dentro del código QR
                    datos.productos.forEach(p => {
                        misComprasGuardadas.push({
                            producto: p.nombre,
                            cantidad: p.cant,
                            fecha: datos.fecha
                        });
                    });

                    // Guardamos en el almacenamiento de este celular específico
                    localStorage.setItem('app_mis_compras', JSON.stringify(misComprasGuardadas));
                    
                    alert("¡QR Escaneado con éxito! Puntos cargados.");
                    actualizarHistorialYPuntos();
                } else {
                    alert("Este código QR no pertenece a Raíz Repostería.");
                }
            } catch (e) {
                alert("Código QR inválido o corrupto.");
            }
        }

        function actualizarHistorialYPuntos() {
            const compras = JSON.parse(localStorage.getItem('app_mis_compras')) || [];
            let puntos = 0;
            const contenedor = document.getElementById('lista-historial');
            contenedor.innerHTML = '';

            if (compras.length === 0) {
                contenedor.innerHTML = `<p class="text-xs text-gray-500 italic text-center py-4">Aún no has escaneado códigos.</p>`;
            } else {
                compras.reverse().forEach(c => {
                    const ptsGanados = c.cantidad * 10;
                    puntos += ptsGanados;

                    contenedor.innerHTML += `
                        <div class="border border-black p-2 bg-gray-50 text-xs flex justify-between items-center">
                            <div>
                                <p class="font-bold uppercase">${c.producto}</p>
                                <p class="text-[10px] text-gray-500">${c.fecha} · Cant: ${c.cantidad}</p>
                            </div>
                            <span class="bg-blue-100 text-blue-700 font-bold px-2 py-0.5 text-[10px]">+${ptsGanados} pts</span>
                        </div>
                    `;
                });
            }
            document.getElementById('total-puntos').innerText = puntos;
        }
    </script>
</body>
</html>
