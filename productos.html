<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel - Raíz Repostería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { crema: '#fef5d4', verdeLike: '#9bf08b', azulBtn: '#2b88ff' } } } }
    </script>
    <style>
        body { background-color: #fef5d4; font-family: sans-serif; color: #111; }
        .product-card, .neo-box { border: 2px solid black; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover { transform: translateY(-6px) translateX(-2px); box-shadow: 7px 7px 0px 0px rgba(0,0,0,1); }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden bg-crema">

    <header class="p-4 border-b-2 border-black flex items-center justify-between bg-white/80 backdrop-blur-md px-6 sticky top-0 z-40 transition-all duration-300">
        <div class="font-bold uppercase tracking-tighter italic text-xl flex items-center gap-2">
            <i class="ph ph-cookie text-amber-600 animate-spin" style="animation-duration: 20s"></i> Raíz Repostería
        </div>
        <div class="flex items-center gap-4">
            <span id="usuario-badge" class="text-[10px] font-black uppercase bg-black text-white px-2.5 py-1 border border-black rounded-sm">Sucursal Abierta</span>
        </div>
    </header>

    <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-2">
            <h2 class="text-3xl font-bold mb-8 uppercase italic flex items-center gap-2"><i class="ph ph-storefront text-amber-700"></i> Catálogo en la Nube</h2>
            <div id="contenedor-productos" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex items-center gap-2 font-bold text-gray-500 uppercase italic"><i class="ph ph-spinner animate-spin"></i> Cargando base de datos artesanal...</div>
            </div>
        </section>

        <section>
            <div class="bg-white p-6 neo-box shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] sticky top-24 hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] transition-all duration-300">
                <h3 class="text-xl font-bold uppercase italic mb-4 flex items-center gap-2 border-b-2 border-black pb-2"><i class="ph ph-shopping-cart-simple text-blue-600"></i> Carrito</h3>
                <div id="lista-carrito" class="flex flex-col gap-3 max-h-64 overflow-y-auto mb-4 pr-1"></div>
                <div class="border-t-2 border-black pt-4 flex flex-col gap-2">
                    <div class="flex justify-between font-bold text-sm uppercase"><span>Total artículos:</span><span id="carrito-cantidad" class="bg-black text-white px-2 py-0.5 text-xs transition-all duration-300 scale-100">0</span></div>
                    <button id="btn-pagar" onclick="abrirModalPago()" disabled class="w-full mt-2 bg-gray-300 text-gray-500 border-2 border-black py-3 font-bold uppercase text-xs transition-all duration-300">Proceder al Pago</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-pago-qr" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white border-2 border-black p-6 w-full max-w-md shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center transform scale-95 transition-all duration-300">
            <h3 class="text-2xl font-bold mb-2 uppercase italic flex items-center justify-center gap-2"><i class="ph ph-qr-code text-blue-600"></i> Código de Puntos</h3>
            <p class="text-xs text-gray-600 mb-6 uppercase font-bold">Muestra este código al cliente para registrar su compra desde su App.</p>
            <div class="p-4 bg-white border-2 border-black shadow-sm mb-4 flex items-center justify-center mx-auto w-[212px] h-[212px] transition-transform duration-500 hover:scale-105">
                <div id="canvas-qrcode"></div>
            </div>
            <p id="info-pago-qr" class="text-[11px] font-black uppercase text-blue-600 mb-6 px-2 tracking-wide"></p>
            <div class="flex flex-col gap-2">
                <button onclick="confirmarVentaNube()" class="w-full bg-verdeLike border-2 border-black py-3 font-bold uppercase text-xs shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:bg-green-400 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 transition-all duration-200">Confirmar Descuento de Inventario</button>
                <button onclick="cerrarModalPago()" class="w-full border-2 border-black py-2 font-bold text-gray-500 text-[11px] uppercase hover:bg-gray-100 transition-colors duration-200">Cerrar / Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ksxrpcfvnnkjfriolvxs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_UXlc_48QjL-VGyvspecs2w_hbPKq3Il";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let listaProductosBD = [];
        let carrito = [];
        let usuarioSesion = null;

        window.onload = function() {
            usuarioSesion = JSON.parse(localStorage.getItem('usuario_logueado'));
            if (usuarioSesion && usuarioSesion.nombre) {
                document.getElementById('usuario-badge').innerText = `Encargado: ${usuarioSesion.nombre}`;
            }
            descargarProductosDesdeNube();
        };

        async function descargarProductosDesdeNube() {
            let { data, error } = await _supabase.from('productos').select('*').order('id', { ascending: true });
            if (error) { console.error(error); return; }
            listaProductosBD = data;
            dibujarCatalogo();
        }

        function dibujarCatalogo() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            listaProductosBD.forEach((p, index) => {
                contenedor.innerHTML += `
                    <div class="product-card bg-white p-4 flex flex-col border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] animate-fade-in-up" style="animation-delay: ${index * 70}ms">
                        <div class="overflow-hidden border-b-2 border-black mb-4 h-40">
                            <img src="${p.imagen}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700 ease-out">
                        </div>
                        <h3 class="text-lg font-bold uppercase leading-tight text-amber-950">${p.nombre}</h3>
                        <p class="text-gray-600 text-xs mb-4 flex-grow mt-1">${p.descripcion}</p>
                        <div class="border-t border-black pt-3 mt-auto">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-black uppercase bg-stone-100 px-2 py-0.5 border border-black rounded-sm">Stock: ${p.stock} pzas</span>
                            </div>
                            <div class="flex gap-2">
                                ${p.stock > 0 ? `<button onclick="agregarAlCarrito(${p.id})" class="flex-1 bg-verdeLike border border-black py-2 font-bold text-[11px] uppercase hover:bg-green-400 active:translate-y-0.5 transition-all duration-150 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Agregar al Carrito</button>` : `<button class="flex-1 bg-stone-200 text-stone-400 border border-stone-400 py-2 font-bold text-[11px] uppercase cursor-not-allowed" disabled>Agotado</button>`}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function agregarAlCarrito(id) {
            const prod = listaProductosBD.find(p => p.id === id);
            const item = carrito.find(i => i.id === id);
            if (item && item.cantidad >= prod.stock) { alert("Sin stock suficiente en vitrina"); return; }
            
            // 🚀 CORREGIDO: Eliminamos el texto "Pattern" erróneo que rompía el código aquí
            if (item) {
                item.cantidad++;
            } else {
                carrito.push({ id: prod.id, nombre: prod.nombre, cantidad: 1 });
            }
            
            actualizarInterfazCarrito();
            
            const contador = document.getElementById('carrito-cantidad');
            contador.classList.add('scale-125', 'bg-amber-600');
            setTimeout(() => contador.classList.remove('scale-125', 'bg-amber-600'), 200);
        }

        function actualizarInterfazCarrito() {
            const lista = document.getElementById('lista-carrito');
            const total = document.getElementById('carrito-cantidad');
            const btn = document.getElementById('btn-pagar');
            lista.innerHTML = ''; let cuenta = 0;

            if(carrito.length === 0) {
                lista.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-6 flex flex-col items-center gap-1"><i class="ph ph-basket text-xl"></i> El horno está vacío</p>`;
                btn.disabled = true; btn.className = "w-full mt-2 bg-stone-200 text-stone-400 border-2 border-stone-300 py-3 font-bold uppercase text-xs cursor-not-allowed transition-all duration-300";
            } else {
                carrito.forEach(i => {
                    cuenta += i.cantidad;
                    lista.innerHTML += `
                        <div class="flex justify-between items-center border border-black p-2 bg-stone-50 text-xs font-bold uppercase shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] animate-fade-in-up">
                            <span class="truncate"><i class="ph ph-sparkle text-amber-500"></i> ${i.nombre} <span class="text-blue-600 font-black">x${i.cantidad}</span></span>
                            <button onclick="eliminarDelCarrito(${i.id})" class="text-red-500 font-bold hover:bg-red-50 w-6 h-6 border border-transparent hover:border-black flex items-center justify-center transition-all duration-200">✕</button>
                        </div>`;
                });
                btn.disabled = false; btn.className = "w-full mt-2 bg-azulBtn text-white border-2 border-black py-3 font-bold uppercase text-xs shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] hover:shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] hover:bg-blue-600 active:translate-y-0.5 transition-all duration-200";
            }
            total.innerText = cuenta;
        }

        function eliminarDelCarrito(id) {
            carrito = carrito.filter(x => x.id !== id);
            actualizarInterfazCarrito();
        }

        function abrirModalPago() {
            const modal = document.getElementById('modal-pago-qr');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 10);

            const contenedorQR = document.getElementById("canvas-qrcode");
            contenedorQR.innerHTML = "";

            let totalArticulos = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            let nombresProductos = carrito.map(i => `${i.nombre} (x${i.cantidad})`).join(", ");
            
            try {
                const datosQR = {
                    o: "RAIZ",
                    u: usuarioSesion ? usuarioSesion.correo : "sucursal@raiz.com",
                    p: totalArticulos,
                    d: nombresProductos
                };

                new QRCode(contenedorQR, { text: JSON.stringify(datosQR), width: 180, height: 180 });
                document.getElementById("info-pago-qr").innerText = `Total: +${totalArticulos} Puntos para el Cliente`;
            } catch (err) {
                console.error(err);
                contenedorQR.innerHTML = `<p class="text-red-500 text-xs font-bold">Error de Renderizado QR</p>`;
            }
        }

        function cerrarModalPago() {
            const modal = document.getElementById('modal-pago-qr');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function confirmarVentaNube() {
            for (const item of carrito) {
                const prodOriginal = listaProductosBD.find(p => p.id === item.id);
                const nuevoStock = prodOriginal.stock - item.cantidad;
                await _supabase.from('productos').update({ stock: nuevoStock }).eq('id', item.id);
            }

            alert("✨ ¡Venta procesada con éxito y stock descontado del obrador!");
            carrito = []; cerrarModalPago(); actualizarInterfazCarrito(); descargarProductosDesdeNube();
        }
    </script>
</body>
</html>
