<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel - Raíz Repostería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { crema: '#fef5d4', verdeLike: '#9bf08b', azulBtn: '#2b88ff' } } } }
    </script>
    <style>
        body { background-color: #fef5d4; font-family: sans-serif; color: #111; }
        .product-card, .neo-box { border: 2px solid black; }
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <header class="p-4 border-b-2 border-black flex items-center justify-between bg-crema px-6">
        <div class="font-bold uppercase tracking-tighter italic text-xl">Raíz Repostería</div>
        <div class="flex items-center gap-4">
            <span id="usuario-nombre" class="text-xs font-black uppercase text-gray-700 bg-white px-3 py-1.5 border border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Cargando...</span>
            <button onclick="cerrarSesion()" class="bg-red-100 text-red-600 border border-red-400 font-bold text-[10px] px-3 py-1.5 uppercase hover:bg-red-200">Salir</button>
        </div>
    </header>

    <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-2">
            <h2 class="text-3xl font-bold mb-8 uppercase italic flex items-center gap-2"><i class="ph ph-storefront"></i> Catálogo en la Nube</h2>
            <div id="contenedor-productos" class="grid grid-cols-1 md:grid-cols-2 gap-6">Cargando base de datos...</div>
        </section>

        <section>
            <div class="bg-white p-6 neo-box shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] sticky top-6">
                <h3 class="text-xl font-bold uppercase italic mb-4 flex items-center gap-2 border-b-2 border-black pb-2"><i class="ph ph-shopping-cart-simple"></i> Carrito</h3>
                <div id="lista-carrito" class="flex flex-col gap-3 max-h-64 overflow-y-auto mb-4"></div>
                <div class="border-t-2 border-black pt-4 flex flex-col gap-2">
                    <div class="flex justify-between font-bold text-sm uppercase"><span>Total artículos:</span><span id="carrito-cantidad">0</span></div>
                    <button id="btn-pagar" onclick="abrirModalPago()" disabled class="w-full mt-2 bg-gray-300 text-gray-500 border-2 border-black py-3 font-bold uppercase text-xs">Proceder al Pago</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-pago-qr" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white border-2 border-black p-6 w-full max-w-md shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center">
            <h3 class="text-2xl font-bold mb-2 uppercase italic">Código de Puntos</h3>
            <p class="text-xs text-gray-600 mb-6 uppercase font-bold">Muestra este código al cliente. Al escanearlo con su app móvil se registrará su compra.</p>
            <div class="p-4 bg-white border-2 border-black shadow-sm mb-4 flex items-center justify-center mx-auto w-[212px] h-[212px]">
                <div id="canvas-qrcode"></div>
            </div>
            <p id="info-pago-qr" class="text-[11px] font-black uppercase text-blue-600 mb-6 px-2"></p>
            <div class="flex flex-col gap-2">
                <button onclick="confirmarVentaNube()" class="w-full bg-verdeLike border-2 border-black py-3 font-bold uppercase text-xs shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Confirmar Descuento de Inventario</button>
                <button onclick="cerrarModalPago()" class="w-full border-2 border-black py-2 font-bold text-gray-500 text-[11px] uppercase">Cerrar / Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ksxrpcfvnnkjfriolvxs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_UXlc_48QjL-VGyvspecs2w_hbPKq3Il";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let listaProductosBD = [];
        let carrito = [];
        let usuarioSesion = null;

        window.onload = function() {
            usuarioSesion = JSON.parse(localStorage.getItem('usuario_logueado'));
            if (!usuarioSesion) { window.location.href = "index.html"; return; }
            document.getElementById('usuario-nombre').innerText = "Hola, " + usuarioSesion.nombre;
            descargarProductosDesdeNube();
        };

        async function descargarProductosDesdeNube() {
            // Alineado con tus nuevas columnas id e imagen
            let { data, error } = await _supabase.from('productos').select('*').order('id', { ascending: true });
            if (error) { console.error(error); return; }
            listaProductosBD = data;
            dibujarCatalogo();
        }

        function dibujarCatalogo() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            listaProductosBD.forEach(p => {
                contenedor.innerHTML += `
                    <div class="product-card bg-white p-4 flex flex-col border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <img src="${p.imagen}" class="w-full h-40 object-cover border-b-2 border-black mb-4">
                        <h3 class="text-lg font-bold uppercase leading-tight">${p.nombre}</h3>
                        <p class="text-gray-600 text-xs mb-4 flex-grow">${p.descripcion}</p>
                        <div class="border-t border-black pt-3 mt-auto">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-black uppercase bg-gray-100 px-2 py-0.5 border border-black">Stock: ${p.stock}</span>
                            </div>
                            <div class="flex gap-2">
                                ${p.stock > 0 ? `<button onclick="agregarAlCarrito(${p.id})" class="flex-1 bg-verdeLike border border-black py-2 font-bold text-[11px] uppercase">Agregar al Carrito</button>` : `<button class="flex-1 bg-gray-300 border border-black py-2 font-bold text-[11px] uppercase cursor-not-allowed" disabled>Agotado</button>`}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function agregarAlCarrito(id) {
            const prod = listaProductosBD.find(p => p.id === id);
            const item = carrito.find(i => i.id === id);
            if (item && item.cantidad >= prod.stock) { alert("Sin stock suficiente"); return; }
            if (item) item.cantidad++; else carrito.push({ id: prod.id, nombre: prod.nombre, cantidad: 1 });
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const lista = document.getElementById('lista-carrito');
            const total = document.getElementById('carrito-cantidad');
            const btn = document.getElementById('btn-pagar');
            lista.innerHTML = ''; let cuenta = 0;

            if(carrito.length === 0) {
                lista.innerHTML = `<p class="text-xs text-gray-500 italic text-center py-4">Vacío</p>`;
                btn.disabled = true; btn.className = "w-full mt-2 bg-gray-300 text-gray-500 border-2 border-black py-3 font-bold uppercase text-xs";
            } else {
                carrito.forEach(i => {
                    cuenta += i.cantidad;
                    lista.innerHTML += `<div class="flex justify-between border border-black p-2 bg-gray-50 text-xs font-bold uppercase"><span>${i.nombre} x${i.cantidad}</span><button onclick="carrito=carrito.filter(x=>x.id!=${i.id});actualizarInterfazCarrito();" class="text-red-500 font-bold">X</button></div>`;
                });
                btn.disabled = false; btn.className = "w-full mt-2 bg-azulBtn text-white border-2 border-black py-3 font-bold uppercase text-xs shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]";
            }
            total.innerText = cuenta;
        }

        function abrirModalPago() {
            document.getElementById('modal-pago-qr').classList.remove('hidden');
            const contenedorQR = document.getElementById("canvas-qrcode");
            contenedorQR.innerHTML = "";

            let totalArticulos = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            let nombresProductos = carrito.map(i => `${i.nombre} (x${i.cantidad})`).join(", ");
            
            // Tratamiento de errores blindado para prevenir fallos en renderizado del canvas
            try {
                const datosQR = {
                    o: "RAIZ",
                    u: usuarioSesion ? usuarioSesion.correo : "anonimo@raiz.com",
                    p: totalArticulos,
                    d: nombresProductos
                };

                new QRCode(contenedorQR, { text: JSON.stringify(datosQR), width: 180, height: 180 });
                document.getElementById("info-pago-qr").innerText = `Contiene: ${totalArticulos} Artículos / Puntos`;
            } catch (err) {
                console.error(err);
                contenedorQR.innerHTML = `<p class="text-red-500 text-xs font-bold">Error al generar QR de sesión</p>`;
            }
        }

        async function confirmarVentaNube() {
            for (const item of carrito) {
                const prodOriginal = listaProductosBD.find(p => p.id === item.id);
                const nuevoStock = prodOriginal.stock - item.cantidad;
                await _supabase.from('productos').update({ stock: nuevoStock }).eq('id', item.id);
            }

            alert("¡Inventario Descontado! Listo para el escaneo móvil del cliente.");
            carrito = []; cerrarModalPago(); actualizarInterfazCarrito(); descargarProductosDesdeNube();
        }

        function cerrarModalPago() { document.getElementById('modal-pago-qr').classList.add('hidden'); }
        function cerrarSesion() { localStorage.removeItem('usuario_logueado'); window.location.href = "index.html"; }
    </script>
</body>
</html>
